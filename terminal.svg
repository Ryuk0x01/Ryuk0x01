<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <style>
    .t { font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 13px; }
    .dim { fill:#6b7280; }
    .green { fill:#00ff99; }
    .cyan { fill:#00e5ff; }
    .pink { fill:#ff3df2; }
    .bg { fill:#05060a; }
  </style>

  <!-- Background -->
  <rect width="900" height="520" rx="12" class="bg"/>

  <!-- Neon glow bar -->
  <rect width="900" height="40" rx="12" fill="#0b1020"/>
  <circle cx="20" cy="20" r="5" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="5" fill="#febc2e"/>
  <circle cx="60" cy="20" r="5" fill="#28c840"/>
  <text x="450" y="25" text-anchor="middle" class="t dim"> TERMINAL ~ ryuk system</text>

  <!-- scanline effect -->
  <rect width="900" height="520" fill="url(#scan)" opacity="0.05"/>

  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff99"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- Boot text -->
  <text x="30" y="90" class="t green">
    > booting cyber system...
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze"/>
  </text>

  <text x="30" y="120" class="t dim" opacity="0">
    > loading modules: web / security / exploit-db
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
  </text>

  <text x="30" y="150" class="t dim" opacity="0">
    > initializing hacker environment...
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
  </text>

  <text x="30" y="190" class="t green" opacity="0">
    > system ready ✔
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- Prompt -->
  <text x="30" y="240" class="t cyan" opacity="0">
    cyber@ryuk:~$
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="160" y="240" class="t pink" opacity="0">
    whoami
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="30" y="280" class="t dim" opacity="0">
    Ryuk0x01 | Cyber Security | Bug Bounty Hunter | Developer
    <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.5s" fill="freeze"/>
  </text>

  <!-- skills -->
  <text x="30" y="330" class="t cyan" opacity="0">
    > skills loaded:
    <animate attributeName="opacity" from="0" to="1" begin="4s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="30" y="360" class="t dim" opacity="0">
    Python • JavaScript • Go • Bash • Linux
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.4s" fill="freeze"/>
  </text>

  <text x="30" y="385" class="t dim" opacity="0">
    Web Security • API Testing • CTF • Recon
    <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- Matrix cursor -->
  <rect x="30" y="420" width="8" height="14" fill="#00ff99">
    <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
